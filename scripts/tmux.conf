# ╔══════════════════════════════════════════════════════════════╗
# ║  Tmux configuration snippet for Deep Code Status            ║
# ║                                                              ║
# ║  Add this to your ~/.tmux.conf                               ║
# ║  Requires: scripts/deepcode-status.sh in your project       ║
# ╚══════════════════════════════════════════════════════════════╝

# --- Deep Code Status in the right status bar ---
# Shows balance ($) + session timer
# Update every 30 seconds (API is cached anyway)

set -g status-right "#(bash ~/deepseek/scripts/deepcode-status.sh --tmux) | %H:%M"
set -g status-right-length 80
set -g status-interval 30

# --- Optional: record session start when tmux opens ---
# set -g hook-session-created 'run-shell "bash ~/deepseek/scripts/deepcode-status.sh --record-session"'
